<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진해고등학교 입학 상담 챗봇 2.0</title>
    <link rel="stylesheet" href="index.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo-wrapper">
                    <img src="school_logo.png" alt="진해고등학교 로고" id="school-logo">
                </div>
                <div class="title-wrapper">
                    <h1 class="eng-title">Jinhae High School</h1>
                    <p class="slogan">꿈을 향한 도전, 세계를 향한 비상</p>
                    <p class="subtitle">2026학년도 입학 상담 챗봇 2.0</p>
                </div>
            </div>
        </header>

        <!-- Chat History -->
        <main id="chat-history">
            <div class="message bot-message fade-in">
                <div class="message-content">
                    반갑습니다! 😊 <strong>진해고등학교 입학 상담 챗봇</strong>입니다.<br>
                    2026학년도 신입생 모집 정보부터 기숙사, 장학금, 입시 결과까지 궁금하신 내용을 무엇이든 물어보세요!
                </div>
            </div>
        </main>

        <!-- Quick Actions -->
        <div class="quick-actions-container">
            <div class="quick-actions">
                <button class="quick-btn" onclick="sendQuickMessage('2026학년도 전형 일정 알려줘')">🗓️ 전형 일정</button>
                <button class="quick-btn" onclick="sendQuickMessage('기숙사 선발 기준이 어떻게 돼?')">🏠 기숙사 안내</button>
                <button class="quick-btn" onclick="sendQuickMessage('장학금 종류와 혜택이 궁금해')">💰 장학금 혜택</button>
                <button class="quick-btn" onclick="sendQuickMessage('작년 서울대/의예과 합격 실적 알려줘')">🎓 입시 결과</button>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="input-container">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="질문을 입력해주세요..." autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="admission_knowledge.js"></script>
    <script src="app.js"></script>
</body>
</html>
