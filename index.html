<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진해고등학교 입학 상담 안내 챗봇</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="chat-container">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-school"></i> 진해고등학교</h1>
                <p>입학 상담 안내 챗봇</p>
            </div>
        </header>
        <main id="chat-window">
            <div id="chat-messages">
                <div class="message bot-message">
                    안녕하세요! 😊 진해고등학교 입학에 대해 궁금한 점을 무엇이든 물어보세요.
                </div>
            </div>
        </main>
        <footer>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="질문을 입력하세요..." autofocus>
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <p class="contact-info">진해고등학교 홍보팀 | 055-546-2260</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
