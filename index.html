<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진해고등학교 입학 상담 챗봇 2.0</title>
    <meta name="description" content="진해고등학교 2026학년도 신입생 모집 및 입학 안내를 도와드리는 인공지능 상담 챗봇입니다.">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div id="app-container">
        <!-- Header -->
        <header>
            <div class="school-logo">
                <img src="school_logo.png" alt="진해고 교표" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div class="title-area">
                <h1>Jinhae High School</h1>
                <p class="slogan">꿈을 향한 도전, 세계를 향한 비상</p>
                <p class="subtitle">2026학년도 입학 상담 챗봇 2.0</p>
            </div>
        </header>

        <!-- Chat History -->
        <div id="chat-history">
            <div class="message bot-message">
                반갑습니다! 😊 진해고등학교 입학 상담 챗봇입니다. <br>
                신입생 모집 일정부터 기숙사, 장학금 정보까지 무엇이든 물어보세요!
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('입학 일정이 궁금해')">📅 입학 일정</button>
            <button class="quick-btn" onclick="sendQuickMessage('기숙사 선발 기준')">🛌 기숙사 안내</button>
            <button class="quick-btn" onclick="sendQuickMessage('장학금 제도')">💰 장학금 혜택</button>
            <button class="quick-btn" onclick="sendQuickMessage('작년 입시 결과')">🎓 대입 결과</button>
        </div>

        <!-- Input Area -->
        <form class="input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="질문을 입력해 주세요..." autocomplete="off">
            <button type="submit" id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>

    <!-- Data & Scripts -->
    <script src="admission_knowledge.js"></script>
    <script src="app.js"></script>
</body>
</html>
